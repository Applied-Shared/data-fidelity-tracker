name = "data-fidelity-tracker"
allowed_usergroups = [
  "okta-team-applied-fte@applied.co",
  "ambrosiussen@ext.applied.co",
]
enable_filestore = false
enable_gcs_fuse = false
enable_postgres = false
enable_mysql = false
enable_secrets = true
