  memory = "1Gi"
  cpu = "1"
  timeout = "300s"
  min_instances = 0

[metadata]
  owner = "samvitti.sharma@applied.co"
  maintainers = ["venkata.manivannan@applied.co", "twang@applied.co"]
  description = "Project Data Fidelity: Input Data Validation Tracker — per-dataset camera DQ reports for neural sim"
